<div id="page-profile" class="page">
    <div class="card" style="max-width:600px; margin:0 auto;">
        <div class="card-header">
            <div class="card-title">
                <div class="card-title-icon" style="background:rgba(59,130,246,.15);color:var(--blue)">👤</div>
                User Profile
            </div>
        </div>

        <div style="display:flex; flex-direction:column; align-items:center; margin-bottom: 24px;">
            <div class="profile-photo-container" style="position:relative; cursor:pointer;"
                onclick="document.getElementById('profile-upload').click()">
                <img id="profile-img" src=""
                    style="width:100px; height:100px; border-radius:50%; object-fit:cover; background:var(--grad1); display:none; box-shadow:0 0 12px rgba(59,130,246,.4);" />
                <div id="profile-placeholder"
                    style="width:100px; height:100px; border-radius:50%; background:var(--grad1); display:flex; align-items:center; justify-content:center; font-size:32px; font-weight:bold; box-shadow:0 0 12px rgba(59,130,246,.4);">
                    U</div>
                <div
                    style="position:absolute; bottom:0; right:0; background:var(--blue); border-radius:50%; width:28px; height:28px; display:flex; align-items:center; justify-content:center; border:2px solid var(--bg);">
                    <i class="fa fa-camera" style="font-size:12px;"></i></div>
            </div>
            <input type="file" id="profile-upload" accept="image/*" style="display:none;"
                onchange="handleProfileUpload(event)">
            <div style="font-size:11px; color:var(--muted); margin-top:8px;">Click to change photo</div>
        </div>

        <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" id="profile-name" class="form-input">
        </div>

        <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" id="profile-email" class="form-input" disabled style="opacity:0.6; cursor:not-allowed;">
        </div>

        <div class="stats-row" style="grid-template-columns: 1fr 1fr; margin-top:20px;">
            <div class="stat-card c-purple">
                <div class="stat-icon c-purple"><i class="fa fa-star"></i></div>
                <div class="stat-value" id="profile-xp">0</div>
                <div class="stat-label">Total XP</div>
            </div>
            <div class="stat-card c-blue">
                <div class="stat-icon c-blue"><i class="fa fa-arrow-up"></i></div>
                <div class="stat-value" id="profile-level">1</div>
                <div class="stat-label">Current Level</div>
            </div>
        </div>

        <div class="modal-actions" style="margin-top:24px;">
            <button class="btn btn-primary" style="flex:1" onclick="saveProfile()" id="btn-save-profile">Save
                Changes</button>
            <button class="btn btn-danger" style="flex:1" onclick="doLogout()"><i class="fa fa-right-from-bracket"></i>
                Logout</button>
        </div>
    </div>
</div>
