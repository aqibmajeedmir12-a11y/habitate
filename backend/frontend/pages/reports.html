<!-- ══════════════ REPORTS PAGE ══════════════ -->
<div class="page" id="page-reports">
    <div class="card" style="max-width:800px; margin: 0 auto; display:flex; flex-direction:column; gap:16px;">

        <div class="card-header" style="justify-content:space-between;">
            <div class="card-title">
                <div class="card-title-icon" style="background:rgba(236,72,153,.15);color:var(--pink)"><i
                        class="fa fa-file-pdf"></i></div>
                Habit Intelligence Report
            </div>
            <div>
                <button class="btn btn-primary" onclick="downloadReportPDF()" id="btn-download-pdf"
                    style="display:none;">
                    <i class="fa fa-download"></i> Download PDF
                </button>
            </div>
        </div>

        <div style="font-size:13px;color:var(--muted);text-align:center;padding:30px 0;" id="report-loading">
            <i class="fa fa-spinner fa-spin"
                style="font-size:32px; color:var(--purple-light); margin-bottom:14px;"></i><br>Consulting AI and
            compiling your report...
        </div>

        <!-- The exact container passed to Html2Pdf -->
        <div id="report-content"
            style="display:none; padding:40px; background:#ffffff; color:#1a1a2e; border-radius:8px; align-items:flex-start; flex-direction:column; gap:20px; font-family:'Helvetica Neue', Helvetica, Arial, sans-serif;">

            <!-- Report Header -->
            <div
                style="width:100%; display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #e2e8f0; padding-bottom:15px; margin-bottom:10px;">
                <div style="display:flex; align-items:center; gap:10px;">
                    <div style="font-size:24px;">⚡</div>
                    <div style="font-size:22px; font-weight:800; color:#3b82f6;">HabitAI</div>
                </div>
                <div style="text-align:right;">
                    <div style="font-size:12px; font-weight:600; color:#64748b;">PERFORMANCE REPORT</div>
                    <div style="font-size:10px; color:#94a3b8;" id="report-date"></div>
                </div>
            </div>

            <!-- User Info -->
            <div style="width:100%; margin-bottom:20px;">
                <div style="font-size:18px; font-weight:700; color:#1e293b;" id="report-user-name">User</div>
                <div style="font-size:12px; color:#64748b;">Generated securely on device</div>
            </div>

            <!-- Executive AI Summary -->
            <div
                style="width:100%; padding:20px; background:#f8fafc; border-left:4px solid #7c3aed; border-radius:6px; margin-bottom:25px;">
                <div
                    style="font-size:11px; font-weight:800; color:#7c3aed; text-transform:uppercase; margin-bottom:8px; letter-spacing:0.5px;">
                    <i class="fa fa-brain"></i> AI Executive Summary</div>
                <div style="font-size:14px; line-height:1.6; color:#334155; font-weight:500;" id="report-ai-summary">
                    <!-- Populated via Ollama API -->
                </div>
            </div>

            <!-- Core Stats Grid -->
            <div style="width:100%; display:grid; grid-template-columns:1fr 1fr 1fr; gap:15px; margin-bottom:25px;">
                <div
                    style="padding:15px; background:#f1f5f9; border-radius:8px; text-align:center; border:1px solid #e2e8f0;">
                    <div style="font-size:28px; font-weight:800; color:#1e293b;" id="report-stat-total">0</div>
                    <div
                        style="font-size:11px; color:#64748b; margin-top:4px; font-weight:600; text-transform:uppercase;">
                        Total Habits</div>
                </div>
                <div
                    style="padding:15px; background:#f0fdf4; border-radius:8px; text-align:center; border:1px solid #bbf7d0;">
                    <div style="font-size:28px; font-weight:800; color:#166534;" id="report-stat-pct">0%</div>
                    <div
                        style="font-size:11px; color:#15803d; margin-top:4px; font-weight:600; text-transform:uppercase;">
                        Success Rate</div>
                </div>
                <div
                    style="padding:15px; background:#fffbeb; border-radius:8px; text-align:center; border:1px solid #fef08a;">
                    <div style="font-size:28px; font-weight:800; color:#b45309;" id="report-stat-streak">0</div>
                    <div
                        style="font-size:11px; color:#d97706; margin-top:4px; font-weight:600; text-transform:uppercase;">
                        Avg Streak</div>
                </div>
            </div>

            <!-- Habit Breakdown Table -->
            <div style="width:100%;">
                <div
                    style="font-size:13px; font-weight:800; color:#1e293b; text-transform:uppercase; margin-bottom:12px; letter-spacing:0.5px; border-bottom:1px solid #e2e8f0; padding-bottom:6px;">
                    Current Habits Breakdown</div>
                <table style="width:100%; border-collapse:collapse; font-size:13px;" id="report-table">
                    <thead>
                        <tr
                            style="background:#f8fafc; color:#475569; text-align:left; border-bottom:2px solid #e2e8f0;">
                            <th style="padding:10px;">Habit Name</th>
                            <th style="padding:10px;">Category</th>
                            <th style="padding:10px; text-align:center;">Streak</th>
                            <th style="padding:10px; text-align:right;">Status</th>
                        </tr>
                    </thead>
                    <tbody id="report-table-body" style="color:#334155;">
                        <!-- populated dynamically -->
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</div>
